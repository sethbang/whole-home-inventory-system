services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "27182:27182"
    environment:
      # Auth — set BYPASS_AUTH=true for one-off dev usage only. For any shared
      # deployment, set SECRET_KEY to a real random value and keep BYPASS_AUTH=false.
      - BYPASS_AUTH=${BYPASS_AUTH:-false}
      - SECRET_KEY=${SECRET_KEY:?SECRET_KEY must be set (see backend/.env.example)}
      - ACCESS_TOKEN_EXPIRE_MINUTES=${ACCESS_TOKEN_EXPIRE_MINUTES:-30}
      - DATABASE_URL=sqlite:////app/database/whis.db
      - UPLOAD_DIR=/app/backend/uploads
      - BACKUP_DIR=/app/backend/backups
      - CORS_ORIGINS=https://192.168.1.15:5173,https://localhost:5173,https://frontend:5173
      - CORS_ALLOW_HEADERS=Content-Type,Authorization,Accept,Origin,X-Requested-With
      - CORS_ALLOW_METHODS=GET,POST,PUT,DELETE,OPTIONS,HEAD,PATCH
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - DEBUG=${DEBUG:-false}
    volumes:
      - ./backend/database:/app/database
      - ./backend/uploads:/app/backend/uploads
      - ./backend/backups:/app/backend/backups
    networks:
      - whole-home-inventory-system-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - ./certs:/root/certs:rw
    environment:
      - NODE_ENV=development
      - VITE_API_URL=
      - CERT_OUTPUT_DIR=/root/certs
    depends_on:
      - backend
    networks:
      - whole-home-inventory-system-network

networks:
  whole-home-inventory-system-network:
    driver: bridge
