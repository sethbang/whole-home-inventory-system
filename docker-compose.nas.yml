# NAS deployment compose.
#
# Usage: create a sibling `.env` file (or export vars) with at minimum:
#   SECRET_KEY=<result of: python -c "import secrets; print(secrets.token_urlsafe(64))">
# then:
#   docker compose -f docker-compose.nas.yml up --build -d
#
# This file intentionally never sets BYPASS_AUTH=true: a NAS deployment is a
# shared environment, and the backend's fail-fast check on SECRET_KEY would
# also need to pass — so real auth is mandatory here.
#
# The frontend is a static build served by nginx on port 80 which proxies
# `/api` to the backend on the internal docker network. If you want HTTPS,
# terminate TLS at Synology DSM's reverse proxy (or Caddy/Traefik) and point
# it at host port 5173.

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "27182:27182"
    environment:
      BYPASS_AUTH: "false"
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY must be set in the environment or .env file}
      ACCESS_TOKEN_EXPIRE_MINUTES: "${ACCESS_TOKEN_EXPIRE_MINUTES:-30}"
      DATABASE_URL: "sqlite:////app/database/whis.db"
      UPLOAD_DIR: "/app/backend/uploads"
      BACKUP_DIR: "/app/backend/backups"
      # Same-origin setup through nginx means the browser never issues
      # cross-origin requests, so this list is belt-and-suspenders. Override
      # via the NAS_ORIGINS env var if you add a reverse proxy on another host.
      CORS_ORIGINS: "${NAS_ORIGINS:-https://localhost,http://localhost}"
      CORS_ALLOW_METHODS: "GET,POST,PUT,DELETE,OPTIONS,HEAD,PATCH"
      CORS_ALLOW_HEADERS: "Content-Type,Authorization,Accept,Origin,X-Requested-With"
      LOG_LEVEL: "${LOG_LEVEL:-INFO}"
      DEBUG: "false"
    volumes:
      - /volume1/docker/whole-home-inventory-system/database:/app/database
      - /volume1/docker/whole-home-inventory-system/uploads:/app/backend/uploads
      - /volume1/docker/whole-home-inventory-system/backups:/app/backend/backups
    networks:
      - whole-home-inventory-system-network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    ports:
      - "5173:80"
    depends_on:
      - backend
    networks:
      - whole-home-inventory-system-network
    restart: unless-stopped

networks:
  whole-home-inventory-system-network:
    driver: bridge
